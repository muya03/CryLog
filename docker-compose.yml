services:
  db:
    image: postgres:16
    # La imagen oficial de Postgres es multi-arch y funciona en Apple Silicon (arm64)
    # Docker Desktop lo emula automáticamente si es necesario.
    environment:
      POSTGRES_DB: lloroLog
      POSTGRES_USER: llorouser
      POSTGRES_PASSWORD: lloropassword
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llorouser -d lloroLog"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Interfaz web para explorar la BD en http://localhost:8888
  adminer:
    image: adminer
    ports:
      - "8888:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
